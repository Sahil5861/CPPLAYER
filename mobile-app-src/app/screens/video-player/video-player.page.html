<ion-content>
  <div style="background-color:#fff;position:  fixed;width: 100%;height: 100%;z-index: 2;display: inline-flex;left: 0;top: 0;" *ngIf="!load">
    <img [src]="currentObject.banner" style="width: auto;margin: auto;height: 250px;">
    <ion-spinner name="crescent" style="margin: auto;position: absolute;z-index: 2;left: 0;
    right: 0;
    top: 0;
    bottom: 0;width: 80px;height: 80px;"></ion-spinner>
  </div>
  <div class="video-container">
    <video controls disablePictureInPicture controlsList="nodownload nofullscreen noremoteplayback" #video id="video" poster="assets/bg.png" muted preload="auto" autoplay playsinline webkit-playsinline style="background-size: 100px;background-position: center;background-repeat: no-repeat;background: white;height: 100vh;object-fit: cover;width: 100%;" type="application/x-mpegURL"></video>
  </div>
  
</ion-content>
