<ion-header [translucent]="false">
  <ion-toolbar color="blackColor">
    <ion-buttons slot="start">
      <ion-back-button color="light"></ion-back-button>
    </ion-buttons>
      <ion-title color="light">
        Episodes <br><small class="primaryColor14SemiBold">{{show}}</small>
      </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div style="margin:20px 0">
    <ion-grid [fixed]="true" style="--ion-grid-columns: 3;">
      <ion-row>
        <ion-col
          size="1"
          *ngFor="let item of items; let index = index;"
          style="padding: 5px;">
          <div class="icon-image-container-list">
            <ion-img
            (click)="play(item)"
              [src]="item.episode_image"
              class="imageOverflow icon-image"
              (ionImgDidLoad)="imageLoaded[index] = true"
            ></ion-img>
            <ion-spinner *ngIf="!imageLoaded[index]" name="crescent"
              style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);"></ion-spinner>
          </div>
          <!-- <p>{{item.title}}</p> -->
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
  <ion-infinite-scroll (ionInfinite)="loadMoreItems($event)">
    <ion-infinite-scroll-content
      loadingSpinner="bubbles"
      loadingText="Loading more data...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
