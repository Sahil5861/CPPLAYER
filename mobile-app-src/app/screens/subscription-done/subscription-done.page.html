<ion-content [fullscreen]="true" scrollY="false">
  <div class="center columnAlignCenter" style="margin: 0 20px; height: 100%">
    <ion-img
      src="../../../assets/images/subscriptionDone.png"
      style="width: 100%; height: 250px; object-fit: contain"
    ></ion-img>
    <ion-text class="whiteColor22Medium" style="margin-top: 30px">
      Congratulations !!
    </ion-text>
    <ion-text class="whiteColor18Regular" style="margin-top: 5px">
      You’re Subscribed User Now
    </ion-text>
  </div>
  <div
    (click)="goTo('/bottom-tab-bar/home')"
    slot="fixed"
    class="center button"
    style="position: absolute; left: 0; right: 0; bottom: 0"
  >
    <ion-text class="whiteColor18Bold"> Find Your Show </ion-text>
  </div>
</ion-content>
