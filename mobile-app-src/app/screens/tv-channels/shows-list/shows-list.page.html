<ion-header [translucent]="false">
  <ion-toolbar color="blackColor">
    <ion-buttons slot="start">
      <ion-back-button color="light"></ion-back-button>
    </ion-buttons>
    <ion-title color="light"> Shows <br><small class="primaryColor14SemiBold">{{channelName}}</small> </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div style="margin: 20px 0">
    <ion-grid [fixed]="true" style="--ion-grid-columns: 3">
      <ion-row>
        <ion-col
          size="1"
          *ngFor="let item of items; let index = index;"
          style="padding: 5px"
        >
          <div class="media-grid-tile" (click)="goTo(item)">
            <div class="icon-image-container-list">
              <app-media-card
                [src]="item.thumbnail"
                [alt]="apiService.getDisplayTitle(item) || 'Show'"
                variant="poster"
              ></app-media-card>
            </div>
            <div class="media-grid-tile__title">
              {{ apiService.getDisplayTitle(item) }}
            </div>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
  <ion-infinite-scroll (ionInfinite)="loadMoreItems($event)">
    <ion-infinite-scroll-content
      loadingSpinner="bubbles"
      loadingText="Loading more data..."
    >
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
